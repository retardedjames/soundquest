server {
    listen 80;
    server_name test5.imretarded.fyi;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name test5.imretarded.fyi;

    ssl_certificate /etc/letsencrypt/live/test5.imretarded.fyi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test5.imretarded.fyi/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/test5.imretarded.fyi;
    index index.html;

    # Service worker must always be served fresh and from /sw.js scope
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Static files
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(png|jpg|jpeg|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8085/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
